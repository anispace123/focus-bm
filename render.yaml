# Render Blueprint — New → Blueprint → осы репозиторийді байланыстыру
# Алғашқы deploy соңында Dashboard-та: VITE_API_URL және CLIENT_ORIGIN қолмен толтырыңыз

services:
  - type: web
    name: focus-bm-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        value: file:./prod.db
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        sync: false

  - type: web
    name: focus-bm-web
    runtime: static
    region: frankfurt
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false
